title: My Blog
description: >-
  Personal blog migrated from WordPress.
url: ""          # your GitHub Pages URL, e.g. https://username.github.io
baseurl: ""      # leave empty for root domain, or "/repo-name" for project pages
theme: minima    # free Jekyll theme; swap for any Gem-based theme

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Pagination (requires jekyll-paginate)
paginate: 10
paginate_path: "/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude dev files
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - convert.py
