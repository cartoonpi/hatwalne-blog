title: Hatwalne
description: >-
  Personal blog of Piyussh Hatwalne.
url: "https://cartoonpi.github.io"
baseurl: "/hatwalne-blog"
# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Pagination (requires jekyll-paginate)
paginate: 10
paginate_path: "/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude dev files
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - convert.py
